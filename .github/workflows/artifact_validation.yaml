name: Artifact validation

on:
  push:
    branches: [ '*' ]

concurrency:
  group: "pages"
  cancel-in-progress: false
  
jobs:
  oqs_validation:
    runs-on: ubuntu-latest
    container: openquantumsafe/oqs-ossl3
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Test artifacts with OQS
        run: ./src/test_certs_r3_with_oqs.sh
      - name: Save artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Compatibility_oqs_csv
          path: ./output/
          
  acvts_validation:
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/dotnet/sdk:8.0
    steps:
      - name: Checkout pqc-certificates
        uses: actions/checkout@v4
        with:
          path: ./pqc-certificates
      - name: Checkout ACVP-Server (jwl/versions-in-some-packages)
        uses: actions/checkout@v4
        with:
          repository: josephlukefahr/ACVP-Server
          ref: jwl/versions-in-some-packages
          path: ./ACVP-Server
      - name: Install zip/unzip/dos2unix
        run: apt update && apt install -y zip unzip dos2unix
      - name: Patch all csproj TargetFramework(s) to net8.0
        run: |
          find ./ACVP-Server -name '*.csproj' | while read f; do
            dos2unix "$f" 2>/dev/null
            sed -i \
              -e 's|<TargetFramework>[^<]*</TargetFramework>|<TargetFramework>net8.0</TargetFramework>|g' \
              -e 's|<TargetFrameworks>[^<]*</TargetFrameworks>|<TargetFrameworks>net8.0</TargetFrameworks>|g' \
              "$f"
          done
          echo "TFM patch complete."
      - name: Restore NuGet packages
        run: >
          dotnet restore
          ./ACVP-Server/gen-val/src/solutions/all/All.sln
          --no-cache
          -p:BuildGenValPackages=false
      - name: Create output directory
        run: mkdir -p ./output
      - name: Run ACVTS certificate tests
        run: /bin/bash ./pqc-certificates/src/test_certs_r3_with_acvts.sh ./pqc-certificates
      - name: Save artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Compatibility_acvts_csv
          path: ./output
          
  build_results_html:
    runs-on: ubuntu-latest
    container: ubuntu:latest
    needs: [oqs_validation, acvts_validation]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install packages
        run: | 
          apt-get update && \
          apt-get install -y pandoc lsb-release
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install python requirements
        run: python -m pip install -r src/requirements.txt
      - name: Get OQS results from previous job
        uses: actions/download-artifact@v4
        with: 
          name: Compatibility_oqs_csv
          path: output/
      - name: Get acvts results from previous job
        uses: actions/download-artifact@v4
        with: 
          name: Compatibility_acvts_csv
          path: output/
      - name: Build compat matrix (r3)
        run: ./src/rebuild_results_certs_r3.sh
      - name: Build compat matrix (r4)
        run: ./src/rebuild_results_certs_r4.sh
      - name: Copy output files
        run: mv ./docs/pqc_hackathon_results_certs_r3.html ./docs/pqc_hackathon_results_certs_r3_automated_tests.html ./docs/pqc_hackathon_results_certs_r4.html ./docs/pqc_hackathon_results_cms_v1.html ./output/certs/oqs_certs.log ./output/certs/bc_certs.log ./docs/gh-pages
      - name: Archive Compatibility Matrix For Download
        uses:  actions/upload-pages-artifact@v3
        with:
          path: ./docs/gh-pages

  publish_to_gh_pages:
    needs: build_results_html
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Update git pages with new compatibiliy matrix
        id: deployment
        uses: actions/deploy-pages@v4
